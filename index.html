<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市稅捐處 - 智慧應答系統</title>
    <style>
        :root { --primary-color: #0b4a60; --secondary-color: #3f9293; --accent-color: #e28743; --light-bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--light-bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 20px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .catalog-card { background: #fff; border: 2px solid #e2e8f0; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .catalog-card:hover { border-color: var(--secondary-color); }
        .catalog-card.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .search-input { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; }
        .dict-item { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .dict-q { font-weight: bold; color: #9a3412; background: #fff7ed; padding: 10px; border-left: 4px solid var(--accent-color); margin-bottom: 10px; }
        .dict-a { color: #166534; background: #f0fdf4; padding: 10px; border-left: 4px solid #20bf6b; }
        .highlight { background-color: #fef08a; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>📞 臺北市稅捐處 - 智慧應答系統</h1></div>
    
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 全資料庫搜尋（隨時輸入關鍵字，不需選擇項目）..." oninput="search()">

    <div id="catalogGrid" class="catalog-grid"></div>
    <div id="resultsList"></div>
</div>

<script>
let fullBank = [];
let activeCate = "全部";

fetch('./tax_bank.json')
    .then(res => res.json())
    .then(data => {
        fullBank = data.questions || data;
        renderCatalog();
        renderResults(fullBank);
    });

function renderCatalog() {
    const cates = ["全部", ...new Set(fullBank.map(i => i.category))];
    document.getElementById('catalogGrid').innerHTML = cates.map(c => 
        `<div class="catalog-card ${c === activeCate ? 'active' : ''}" onclick="filterByCate('${c}')">${c}</div>`
    ).join('');
}

function filterByCate(cate) {
    activeCate = cate;
    document.getElementById('searchInput').value = ""; // 清空搜尋
    renderCatalog();
    const data = (cate === "全部") ? fullBank : fullBank.filter(i => i.category === cate);
    renderResults(data);
}

function search() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    activeCate = "全部"; // 搜尋時重置選取狀態
    renderCatalog();
    
    const filtered = fullBank.filter(i => 
        (i.title && i.title.toLowerCase().includes(val)) || 
        (i.answer && i.answer.toLowerCase().includes(val))
    );
    renderResults(filtered, val);
}

function renderResults(data, keyword = "") {
    const list = document.getElementById('resultsList');
    list.innerHTML = data.map(i => {
        let q = i.title || "", a = i.answer || "";
        if(keyword) {
            const regex = new RegExp(`(${keyword})`, "gi");
            q = q.replace(regex, `<span class="highlight">$1</span>`);
            a = a.replace(regex, `<span class="highlight">$1</span>`);
        }
        return `<div class="dict-item">
            <div style="font-size:12px; color:#666;">${i.category}</div>
            <div class="dict-q">Q: ${q}</div>
            <div class="dict-a">A: ${a}</div>
        </div>`;
    }).join('');
}
</script>
</body>
</html>
