<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市稅捐處 - 電話測試智慧應答雙模系統</title>
    <style>
        :root { --primary-color: #0b4a60; --secondary-color: #3f9293; --accent-color: #e28743; --light-bg: #f4f7f6; --success-color: #20bf6b; --danger-color: #eb3b5a; --board-bg: #ffffff; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--light-bg); margin: 0; padding: 15px; color: #2c3e50; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
        .header { text-align: center; border-bottom: 3px solid var(--primary-color); padding-bottom: 12px; margin-bottom: 20px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        .mode-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 2px solid var(--primary-color); }
        .tab { flex: 1; padding: 14px 10px; text-align: center; cursor: pointer; font-weight: bold; background: white; color: var(--primary-color); }
        .tab.active { background: var(--primary-color); color: white; }
        .mode-section { display: none; }
        .mode-section.active { display: block; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .catalog-card { background: var(--board-bg); border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px 8px; text-align: center; cursor: pointer; }
        .catalog-card.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .search-section { background: #f8fafc; padding: 16px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .search-input { width: 100%; padding: 14px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .dict-item { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; margin-bottom: 15px; }
        .dict-q { background: #fff7ed; padding: 12px; border-radius: 6px; border-left: 4px solid var(--accent-color); margin-bottom: 10px; font-weight: bold; color: #9a3412;}
        .dict-a { background: #f0fdf4; padding: 12px; border-radius: 6px; border-left: 4px solid var(--success-color); line-height: 1.6; white-space: pre-wrap; color: #166534;}
        .highlight { background-color: #fef08a; font-weight: bold; color: #b45309; }
        .tag-cate { font-size: 11px; background: var(--secondary-color); color:white; padding: 3px 8px; border-radius: 12px; }
        .loading-screen { text-align: center; padding: 50px; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loading-screen">⏳ 正在載入題庫，請稍候...</div>
    <div id="appContent" style="display: none;">
        <div class="header"><h1>📞 臺北市稅捐處 ‧ 智慧應答系統</h1></div>
        <div class="mode-tabs">
            <div class="tab active" id="tabDict" onclick="switchMode('dict')">🖼️ 全庫檢索與速查</div>
            <div class="tab" id="tabQuiz" onclick="switchMode('quiz')">🎯 自我訓練</div>
        </div>

        <div id="sectionDict" class="mode-section active">
            <div class="catalog-grid" id="catalogGrid"></div>
            <div class="search-section">
                <input type="text" id="dictSearch" class="search-input" placeholder="🔍 輸入關鍵字，系統將直接進行「全資料庫」搜尋..." oninput="renderDict()">
            </div>
            <div id="searchCount" style="margin-bottom:10px; font-weight:bold;"></div>
            <div id="dictList"></div>
        </div>

        <div id="sectionQuiz" class="mode-section">
            <div id="quizContainer"></div>
        </div>
    </div>
</div>

<script>
let taxBank = [];
let currentDictCate = "";

function loadTaxBankJson() {
    fetch('./tax_bank.json')
        .then(res => res.json())
        .then(data => {
            let rawList = data.questions || data;
            taxBank = rawList.map(item => ({
                category: (item.category || "其他").replace(/^[壹貳參肆伍陸柒捌玖拾拾壹、\s]+/, ""),
                q: item.title || "",
                a: item.answer || "",
                tips: "此題為本處業務核心指標，請引導民眾利用e化平台申辦。"
            }));
            document.getElementById("loading").style.display = "none";
            document.getElementById("appContent").style.display = "block";
            renderCatalog();
            renderDict();
        });
}

function renderCatalog() {
    const grid = document.getElementById("catalogGrid");
    const categories = Array.from(new Set(taxBank.map(t => t.category)));
    grid.innerHTML = categories.map(c => 
        `<div class="catalog-card ${c === currentDictCate ? 'active' : ''}" onclick="currentDictCate='${c}'; renderCatalog(); renderDict();">
            ${c} (${taxBank.filter(t=>t.category===c).length})
        </div>`
    ).join('');
}

function renderDict() {
    const keyword = document.getElementById("dictSearch").value.trim().toLowerCase();
    const list = document.getElementById("dictList");
    
    // 核心邏輯：如果沒輸入關鍵字，就顯示分類；如果有輸入，就搜尋全庫
    let filtered = keyword ? taxBank : taxBank.filter(t => t.category === currentDictCate);

    if (keyword) {
        filtered = taxBank.filter(item => 
            item.q.toLowerCase().includes(keyword) || 
            item.a.toLowerCase().includes(keyword)
        );
    }

    document.getElementById("searchCount").innerText = keyword ? `🔍 全資料庫搜尋結果：找到 ${filtered.length} 筆` : `📂 當前分類 [${currentDictCate}]：共 ${filtered.length} 筆`;

    list.innerHTML = filtered.map(item => {
        let q = item.q;
        let a = item.a;
        if(keyword) {
            const regex = new RegExp(`(${keyword})`, "gi");
            q = q.replace(regex, `<span class="highlight">$1</span>`);
            a = a.replace(regex, `<span class="highlight">$1</span>`);
        }
        return `<div class="dict-item">
                    <span class="tag-cate">${item.category}</span>
                    <div class="dict-q">${q}</div>
                    <div class="dict-a">${a}</div>
                </div>`;
    }).join('');
}

function switchMode(mode) {
    document.getElementById("sectionDict").style.display = mode === 'dict' ? 'block' : 'none';
    document.getElementById("sectionQuiz").style.display = mode === 'quiz' ? 'block' : 'none';
}

window.onload = loadTaxBankJson;
</script>
</body>
</html>
