</head>

<div class="container">
    <div class="header">
        <h1>📞 臺北市稅捐處 ‧ 跨機關智慧應答雙模系統</h1>

// 精準去編號後的官方看板大類結構
const catalogConfig = [
    { name: "房屋稅", icon: "🏠" },
    { name: "地價稅", icon: "🗺️" },
    { name: "契稅", icon: "📄" },
    { name: "土地增值稅", icon: "📈" },

    { name: "延分期相關", icon: "⏳" },
    { name: "稅務管理及其他", icon: "🤝" }
];

// 全能題庫數據庫（正式包含所有題目、標準擬答、核心關鍵字與小叮嚀）
const taxBank = [
    {
        category: "房屋稅",
        q: "115年臺北市房屋稅基變革為何？",
        keywords: ["不動產評價委員會", "建築能效標示", "地段率調整", "構造標準單價減價"],
        a: "依本處公告115年兩大稅基新變革：\n1. 綠建築節能減稅：針對首次取得建築能效標示第1級、1+級或0級之房屋，給予房屋構造標準單價「減價5%」的優惠（限10年）。\n2. 地段率微調：依據各路段商業交通繁榮情形評定調整，影響路段總計60條。",
        tips: "【話務小叮嚀】結合ESG政策，全台首創將『建築能效』融入稅基折減，為本處創新與電話抽測必考宣導亮點。"
    },
    {
        category: "房屋稅",
        q: "家戶持有全國單一且自住並設立戶籍的本市房屋，115年期稅基折減比率與現值門檻為何？",
        keywords: ["全國單一自住", "折減20%", "2,674,200元", "實質稅率0.8%"],
        a: "本市全國單一自住高價住宅排除門檻與折減政策調整如下：\n1. 115年期房屋稅基折減比率已改為「折減20%」（換算實質稅率約為0.8%）。\n2. 適用之房屋現值一定金額門檻經評定為「新臺幣2,674,200元以下」者始符合資格。",
        tips: "【話務小叮嚀】配合中央2.0逐年緩步恢復機制，請務必精準回覆115年期對應數字2,674,200元，高於此現值則不適用折減。"
    },
    {
        category: "地價稅",
        q: "新買或繼承的房屋作自用住宅，逾9月22日申請期限，有無當年度適用的補救辦法？",
        keywords: ["9月22日", "土地增值稅", "契稅申報", "先行勾選", "補送文件"],
        a: "依規定特別稅率申請需於9月22日前提出，逾期原則自次年起適用。\n【補救機制】：若所有權人在先前辦理移轉申報「契稅」或「土地增值稅」時，已於申報書上「先行勾選提出申請」自用住宅用地稅率者，只要該土地在當年9月22日前符合自用要件，此時只需「趕快補送戶籍及建物相關證明文件」，當年度仍可按2‰優惠稅率課徵！",
        tips: "【話務小叮嚀】同仁接聽時應主動協助查詢原申報書勾選狀態，這是非常貼心的主動便民服務，常為民眾爭取到當年度即時減免。"
    },
    {
        category: "契稅",
        q: "配偶之間相互贈與房屋，是否需要申報繳納契稅？",
        keywords: ["配偶相互贈與", "不課徵土地增值稅", "仍應申報繳納契稅", "契約成立之日起30日內"],
        a: "是的，仍應申報繳納契稅。\n配偶間相互贈與土地可以申請不課徵土地增值稅，但「房屋」贈與並無免除契稅之規定。因此，仍應於贈與契約成立之日起30日內，向房屋所在地之稅捐稽徵機關申報繳納契稅。",
        tips: "【話務小叮嚀】常有民眾將土地與房屋混為一談，誤以為土地免稅房屋就免稅，應特別提醒土增稅與契稅在法規上的本質差異。"
    },
    {
        category: "土地增值稅",
        q: "繼承外縣市房屋和土地，可否至臺北市稅捐稽徵處辦理地方稅查欠手續？",

    {

    },
    {
        category: "娛樂稅",
        q: "選物販賣機（娃娃機）應如何課徵娛樂稅？",

        a: "選物販賣機（娃娃機）屬於娛樂稅法規定的娛樂設施，應依規定課徵娛樂稅。本處通常採用「查定課徵」方式，由稅務人員依據機台數量、營業地點及營業狀況評定稅額，並按月寄發稅單。營業人應於開業前向本處辦理登記及代徵報繳手續。",

    {

        q: "承攬契約中包含營業稅，應如何計繳印花稅？",

// 各大類快速篩選標籤庫（隨點即搜）
const folderChips = {
    "房屋稅": ["不動產評價委員會", "建築能效標示", "全國單一自住", "2,674,200", "折減20%"],
    "地價稅": ["9月22日", "自用住宅用地", "千分之2", "補送文件"],
    "契稅": ["配偶相互贈與", "仍應申報繳納契稅", "30日內"],
    "土地增值稅": ["不能跨縣市代辦", "房地所在地", "繼承登記"],
    "使用牌照稅": ["身心障礙", "同一戶籍二親等", "2400cc", "11,230元"],
    "娛樂稅": ["選物販賣機", "查定課徵", "主動辦理登記"],
    "印花稅": ["承攬契約", "合約總價", "營業稅額分開載明", "扣除營業稅"],
    "納保及行政救濟": ["復查申請", "繳納期間屆滿次日起", "30日內"],
    "繳稅方式、電子繳款書及繳納證明": ["過了繳納期限", "滯納期30日內", "便利商店代收", "3萬元以下"],
    "延分期相關": ["延期或分期繳納", "天災事變", "經濟弱勢", "不加計利息"],
    "稅務管理及其他": ["稅籍異動即時通", "防詐騙機制", "免費申請", "簡訊或電子郵件通知"]
};

let currentDictCate = "房屋稅";
let currentQuizCate = "房屋稅";
let currentQuizObj = null;

// 1. 建立去編號的官方大類圖卡看板
function buildCatalogDashboard() {
    const grid = document.getElementById("catalogGrid");
    grid.innerHTML = "";

    catalogConfig.forEach(item => {
        let count = taxBank.filter(t => t.category === item.name).length;

        const card = document.createElement("div");
        card.className = `catalog-card ${item.name === currentDictCate ? 'active' : ''}`;
        card.innerHTML = `
            <span class="badge-count">${count} 題</span>
            <span class="icon-wrapper">${item.icon}</span>
            <span class="title-text">${item.name}</span>
        `;
        
        card.onclick = () => {
            currentDictCate = item.name;
            document.querySelectorAll(".catalog-card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");
            
            document.getElementById("dictSearch").value = "";
            updateChips();
            renderDict();
        };
        grid.appendChild(card);
    });
    updateChips();
}

// 2. 標籤聯動更新
function updateChips() {
    const container = document.getElementById("chipsContainer");
    container.innerHTML = "";
    
    const chips = folderChips[currentDictCate] || [];
    chips.forEach(chip => {
        const span = document.createElement("span");
        span.className = "hot-tag";
        span.innerText = `# ${chip}`;
        span.onclick = () => {
            document.getElementById("dictSearch").value = chip;
            renderDict();
        };
        container.appendChild(span);
    });
}

// 3. 全方位題庫精密全檢索（支援匹配題目、答覆、要件、小叮嚀）
function renderDict() {
    const keyword = document.getElementById("dictSearch").value.trim().toLowerCase();
    const listContainer = document.getElementById("dictList");
    listContainer.innerHTML = "";

    // 篩選當前大類
    let filtered = taxBank.filter(item => item.category === currentDictCate);

    // 如果輸入了關鍵字，進行全能跨欄位檢索
    if (keyword) {
        filtered = filtered.filter(item => 
            item.q.toLowerCase().includes(keyword) || 
            item.a.toLowerCase().includes(keyword) || 
            item.tips.toLowerCase().includes(keyword) || 
            item.keywords.some(k => k.toLowerCase().includes(keyword))
        );
    }

    document.getElementById("searchCount").innerText = `📊 當前大類 [${currentDictCate}] 篩選結果：共找到 ${filtered.length} 筆測試題型`;

    if(filtered.length === 0) {
        listContainer.innerHTML = "<div style='text-align:center; padding:35px; color:#94a3b8; font-size:14px;'>❌ 未找到符合該搜尋條件的數據，請清空搜尋框或點選其他快捷標籤。</div>";
        return;
    }

    // 渲染卡片並動態高亮匹配文字
    filtered.forEach(item => {
        const itemEl = document.createElement("div");
        itemEl.className = "dict-item";
        
        let questionTxt = item.q;
        let answerTxt = item.a;
        let tipsTxt = item.tips;
        
        if(keyword) {
            const regex = new RegExp(`(${escapeRegExp(keyword)})`, "gi");
            questionTxt = questionTxt.replace(regex, `<span class="highlight">$1</span>`);
            answerTxt = answerTxt.replace(regex, `<span class="highlight">$1</span>`);
            tipsTxt = tipsTxt.replace(regex, `<span class="highlight">$1</span>`);
        }

        itemEl.innerHTML = `
            <div class="dict-title">
                <span>🔑 官方評核要件：${item.keywords.map(k => `#${k}`).join(" ")}</span>
                <span class="tag-cate">${item.category}</span>
            </div>
            <div class="dict-q">🙋 電話測試問：${questionTxt}</div>
            <div class="dict-a">📢 處內標準答覆：\n${answerTxt}</div>
            <div class="dict-tips">${tipsTxt}</div>
        `;
        listContainer.appendChild(itemEl);
    });
}

function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// 4. 雙模式切換
function switchMode(mode) {
    document.getElementById("tabDict").classList.toggle("active", mode === 'dict');
    document.getElementById("tabQuiz").classList.toggle("active", mode === 'quiz');
    document.getElementById("sectionDict").classList.toggle("active", mode === 'dict');
    document.getElementById("sectionQuiz").classList.toggle("active", mode === 'quiz');
    
    if(mode === 'quiz') { 
        buildQuizCategoryButtons();
        loadRandomQuiz(); 
    } else { 
        buildCatalogDashboard();
        renderDict(); 
    }
}

// 5. 考核區按鈕建立
function buildQuizCategoryButtons() {
    const quizGrid = document.getElementById("quizCateGrid");
    quizGrid.innerHTML = "";
    catalogConfig.forEach(cate => {
        const btnQ = document.createElement("button");
        btnQ.className = `btn btn-cate ${cate.name === currentQuizCate ? 'active' : ''}`;
        btnQ.innerText = cate.name;
        btnQ.title = cate.name;
        btnQ.onclick = () => {
            currentQuizCate = cate.name;
            document.querySelectorAll("#quizCateGrid .btn-cate").forEach(b => b.classList.remove("active"));
            btnQ.classList.add("active");
            loadRandomQuiz();
        };
        quizGrid.appendChild(btnQ);
    });
}

function loadRandomQuiz() {
    document.getElementById("quizResultBox").style.display = "none";
    document.getElementById("quizUserAns").value = "";
    
    let pool = taxBank.filter(q => q.category === currentQuizCate);
    if(pool.length === 0) {
        document.getElementById("quizQuestion").innerText = "💡 該業務大類目前展示數據庫中無考核題目，請點選上方其他分類進行測試。";
        return;
    }
    
    currentQuizObj = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById("quizCateLabel").innerText = `盲測範疇：${currentQuizObj.category}`;
    document.getElementById("quizQuestion").innerText = `「${currentQuizObj.q}」`;
}

function speakQuestion() {
    if ('speechSynthesis' in window && currentQuizObj) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentQuizObj.q);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("網頁瀏覽器不支援語音合成功能。");
    }
}

function showQuizHint() {
    if(!currentQuizObj) return;
    alert(`💡 答題核心詞彙（官方核對點）：\n【${currentQuizObj.keywords.join("、")}】`);
}

function evaluateQuiz() {
    const userAns = document.getElementById("quizUserAns").value.trim();
    if(!userAns) { alert("請先輸入您的模擬話務解說答覆！"); return; }
    if(!currentQuizObj) return;

    let matchCount = 0;
    let kwHtml = "";

    currentQuizObj.keywords.forEach(kw => {
        if(userAns.includes(kw)) {
            matchCount++;
            kwHtml += `<span class="keyword-tag kw-match">✓ ${kw}</span> `;
        } else {
            kwHtml += `<span class="keyword-tag kw-miss">✗ ${kw}</span> `;
        }
    });

    const passThreshold = Math.ceil(currentQuizObj.keywords.length / 2);
    const isPass = matchCount >= passThreshold;
    const resBox = document.getElementById("quizResultBox");

    if(isPass) {
        resBox.className = "result-box pass";
        document.getElementById("quizResultStatus").innerHTML = `🎉 評核結果：合格！成功命中 ${matchCount}/${currentQuizObj.keywords.length} 個官方必備要件`;
        document.getElementById("quizResultStatus").style.color = "var(--success-color)";
    } else {
        resBox.className = "result-box fail";
        document.getElementById("quizResultStatus").innerHTML = `⚠️ 評核結果：未達標準！僅命中 ${matchCount}/${currentQuizObj.keywords.length} 個關鍵詞`;
        document.getElementById("quizResultStatus").style.color = "var(--danger-color)";
    }

    document.getElementById("quizKwAnalysis").innerHTML = kwHtml;
    document.getElementById("quizStandardRef").innerText = currentQuizObj.a;
    document.getElementById("quizTipsRef").innerText = currentQuizObj.tips;
    
    resBox.style.display = "block";
    resBox.scrollIntoView({ behavior: 'smooth' });
}

window.onload = () => {
    buildCatalogDashboard();
    renderDict();
};
</script>
