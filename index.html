    }
];

const categories = ["全部範疇", "金融遺產與繼承", "土地增值稅", "繳稅與證明", "房屋稅", "使用牌照稅"];
let currentMode = "dict"; 
let currentDictCate = "全部範疇";
let currentQuizCate = "全部範疇";
let currentQuizObj = null;

function switchMode(mode) {
    currentMode = mode;
    document.getElementById("tabDict").classList.toggle("active", mode === 'dict');
    document.getElementById("tabQuiz").classList.toggle("active", mode === 'quiz');
    document.getElementById("sectionDict").classList.toggle("active", mode === 'dict');
    document.getElementById("sectionQuiz").classList.toggle("active", mode === 'quiz');
    
    if(mode === 'quiz') { loadRandomQuiz(); } else { renderDict(); }
}

function createCategoryButtons() {
    const dictGrid = document.getElementById("dictCateGrid");
    const quizGrid = document.getElementById("quizCateGrid");
    dictGrid.innerHTML = ""; quizGrid.innerHTML = "";

    categories.forEach(cate => {
        const btnD = document.createElement("button");
        btnD.className = `btn btn-cate ${cate === currentDictCate ? 'active' : ''}`;
        btnD.innerText = cate;
        btnD.onclick = () => {
            currentDictCate = cate;
            document.querySelectorAll("#dictCateGrid .btn-cate").forEach(b => b.classList.remove("active"));
            btnD.classList.add("active");
            renderDict();
        };
        dictGrid.appendChild(btnD);

        const btnQ = document.createElement("button");
        btnQ.className = `btn btn-cate ${cate === currentQuizCate ? 'active' : ''}`;
        btnQ.innerText = cate;
        btnQ.onclick = () => {
            currentQuizCate = cate;
            document.querySelectorAll("#quizCateGrid .btn-cate").forEach(b => b.classList.remove("active"));
            btnQ.classList.add("active");
            loadRandomQuiz();
        };
        quizGrid.appendChild(btnQ);
    });
}

function renderDict() {
    const keyword = document.getElementById("dictSearch").value.trim().toLowerCase();
    const listContainer = document.getElementById("dictList");
    listContainer.innerHTML = "";

    let filtered = taxBank;
    if (currentDictCate !== "全部範疇") { filtered = filtered.filter(item => item.category === currentDictCate); }

    if (keyword) {
        filtered = filtered.filter(item => 
            item.q.toLowerCase().includes(keyword) || 
            item.a.toLowerCase().includes(keyword) || 
            item.category.toLowerCase().includes(keyword) ||
            item.keywords.some(k => k.toLowerCase().includes(keyword))
        );
    }

    document.getElementById("searchCount").innerText = `📊 目前符合篩選條件的話務指引：${filtered.length} 筆`;

    if(filtered.length === 0) {
        listContainer.innerHTML = "<div style='text-align:center; padding:30px; color:#999; font-size:14px;'>無相符題型，請縮短或嘗試其他關鍵字。</div>";
        return;
    }

    filtered.forEach(item => {
        const itemEl = document.createElement("div");
        itemEl.className = "dict-item";
        
        let questionTxt = item.q;
        let answerTxt = item.a;
        if(keyword) {
            const regex = new RegExp(`(${keyword})`, "gi");
            questionTxt = questionTxt.replace(regex, `<span class="highlight">$1</span>`);
            answerTxt = answerTxt.replace(regex, `<span class="highlight">$1</span>`);
        }

        itemEl.innerHTML = `
            <div class="dict-title">
                <span>🔑 條文核心：${item.keywords.join(" ‧ ")}</span>
                <span class="tag-cate">${item.category}</span>
            </div>
            <div class="dict-q">🙋 臨櫃/電話民眾問：${questionTxt}</div>
            <div class="dict-a">📢 審核標準答案：\n${answerTxt}</div>
            <div class="dict-tips">💡 學長姐應答叮嚀：${item.tips}</div>
        `;
        listContainer.appendChild(itemEl);
    });
}

function loadRandomQuiz() {
    document.getElementById("quizResultBox").style.display = "none";
    document.getElementById("quizUserAns").value = "";
    
    let pool = currentQuizCate === "全部範疇" ? taxBank : taxBank.filter(q => q.category === currentQuizCate);
    if(pool.length === 0) {
        document.getElementById("quizQuestion").innerText = "此範疇目前無題目。";
        return;
    }
    
    currentQuizObj = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById("quizCateLabel").innerText = `當前題型：${currentQuizObj.category}`;
    document.getElementById("quizQuestion").innerText = `「${currentQuizObj.q}」`;
}

function speakQuestion() {
    if ('speechSynthesis' in window && currentQuizObj) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentQuizObj.q);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("很抱歉，您的裝置暫不支援語音播放。");
    }
}

function showQuizHint() {
    alert(`💡 答題提示（本題必須對民眾講出以下關鍵字）：\n【${currentQuizObj.keywords.join("、")}】`);
}

function evaluateQuiz() {
    const userAns = document.getElementById("quizUserAns").value.trim();
    if(!userAns) { alert("請先輸入您的模擬答覆內容！"); return; }

    let matchCount = 0;
    let kwHtml = "";

    currentQuizObj.keywords.forEach(kw => {
        if(userAns.includes(kw)) {
            matchCount++;
            kwHtml += `<span class="keyword-tag kw-match">✓ ${kw}</span> `;
        } else {
            kwHtml += `<span class="keyword-tag kw-miss">✗ ${kw}</span> `;
        }
    });

    const passThreshold = Math.ceil(currentQuizObj.keywords.length / 2);
    const isPass = matchCount >= passThreshold;
    const resBox = document.getElementById("quizResultBox");

    if(isPass) {
        resBox.className = "result-box pass";
        document.getElementById("quizResultStatus").innerHTML = `🎉 評核結果：通過考核！(正確命中 ${matchCount}/${currentQuizObj.keywords.length} 個核心關鍵詞)`;
        document.getElementById("quizResultStatus").style.color = "var(--success-color)";
    } else {
        resBox.className = "result-box fail";
        document.getElementById("quizResultStatus").innerHTML = `⚠️ 評核結果：不通過！建議再加強 (僅命中 ${matchCount}/${currentQuizObj.keywords.length} 個核心要件)`;
        document.getElementById("danger-color");
    }

    document.getElementById("quizKwAnalysis").innerHTML = kwHtml;
    document.getElementById("quizStandardRef").innerText = currentQuizObj.a;
    document.getElementById("quizTipsRef").innerText = currentQuizObj.tips;
    
    resBox.style.display = "block";
    resBox.scrollIntoView({ behavior: 'smooth' });
}

window.onload = () => {
    createCategoryButtons();
    renderDict();
};
</script>

</body>
</html>
