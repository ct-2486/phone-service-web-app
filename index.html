<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市稅捐處 - 智慧應答系統</title>
    <style>
        :root { --primary-color: #0b4a60; --secondary-color: #3f9293; --accent-color: #e28743; --light-bg: #f4f7f6; --success-color: #20bf6b; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 20px; }
        .search-section { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .search-input { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .dict-item { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .dict-q { font-weight: bold; color: #9a3412; margin-bottom: 10px; font-size: 16px; background: #fff7ed; padding: 10px; border-left: 4px solid var(--accent-color); }
        .dict-a { line-height: 1.6; font-size: 15px; white-space: pre-wrap; color: #166534; background: #f0fdf4; padding: 10px; border-left: 4px solid var(--success-color); }
        .tag-cate { font-size: 12px; background: var(--secondary-color); color: white; padding: 2px 8px; border-radius: 10px; float: right; }
        .highlight { background-color: #fef08a; font-weight: bold; }
        .loading { text-align: center; font-size: 18px; color: var(--primary-color); padding: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>臺北市稅捐處 - 智慧應答系統</h1></div>
    
    <div class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 全資料庫檢索（直接輸入關鍵字...）" oninput="performSearch()">
    </div>

    <div id="loading" class="loading">⏳ 正在載入資料庫...</div>
    <div id="resultsList"></div>
</div>

<script>
let fullBank = [];

// 讀取 JSON
fetch('./tax_bank.json')
    .then(res => res.json())
    .then(data => {
        fullBank = data.questions || data;
        document.getElementById('loading').style.display = 'none';
        renderResults(fullBank);
    })
    .catch(err => document.getElementById('loading').innerText = "❌ 讀取失敗，請確認檔案名稱與路徑。");

// 搜尋邏輯：全資料庫檢索
function performSearch() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const filtered = fullBank.filter(item => 
        (item.title && item.title.toLowerCase().includes(keyword)) || 
        (item.answer && item.answer.toLowerCase().includes(keyword)) ||
        (item.category && item.category.toLowerCase().includes(keyword))
    );
    renderResults(filtered, keyword);
}

// 渲染結果
function renderResults(data, keyword = "") {
    const list = document.getElementById('resultsList');
    list.innerHTML = "";
    
    data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'dict-item';
        
        let q = item.title || "";
        let a = item.answer || "";
        
        if(keyword) {
            const regex = new RegExp(`(${keyword})`, "gi");
            q = q.replace(regex, `<span class="highlight">$1</span>`);
            a = a.replace(regex, `<span class="highlight">$1</span>`);
        }
        
        div.innerHTML = `
            <span class="tag-cate">${item.category || '一般'}</span>
            <div class="dict-q">Q: ${q}</div>
            <div class="dict-a">${a}</div>
        `;
        list.appendChild(div);
    });
}
</script>
</body>
</html>
