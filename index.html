<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市稅捐處 - 智慧應答雙模系統</title>
    <style>
        :root {
            --primary: #0b4a60; --secondary: #3f9293; --accent: #e28743;
            --bg: #f8fafc; --text: #334155; --card-bg: #ffffff;
            --success: #20bf6b; --danger: #eb3b5a;
        }

        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 28px; margin-bottom: 5px; }
        .header p { color: #64748b; font-size: 14px; }

        /* Tabs */
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; background: #e2e8f0; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }

        /* Grid */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .catalog-card { background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .catalog-card:hover { border-color: var(--secondary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .catalog-card.active { border-color: var(--primary); background: var(--primary); color: white; }

        /* Search */
        .search-box { width: 100%; padding: 15px 20px; border-radius: 30px; border: 2px solid #e2e8f0; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--secondary); box-shadow: 0 0 8px rgba(63, 146, 147, 0.2); }

        /* Content */
        .dict-item { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .dict-q { font-weight: bold; color: #9a3412; font-size: 16px; margin-bottom: 8px; }
        .dict-a { color: #166534; font-size: 14px; background: #f0fdf4; padding: 12px; border-radius: 8px; }
        .highlight { background: #fef08a; padding: 0 2px; }
        
        .mode-section { display: none; }
        .mode-section.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📞 臺北市稅捐處智慧應答系統</h1>
        <p>跨機關話務輔助與盲測訓練平台</p>
    </div>

    <div class="mode-tabs">
        <div class="tab active" onclick="switchMode('dict')">速查隨身小抄</div>
        <div class="tab" onclick="switchMode('quiz')">盲測自我訓練</div>
    </div>

    <div id="sectionDict" class="mode-section active">
        <div class="catalog-grid" id="catalogGrid"></div>
        <input type="text" class="search-box" id="dictSearch" placeholder="🔍 全庫檢索關鍵字..." oninput="renderDict()">
        <div id="dictList"></div>
    </div>

    <div id="sectionQuiz" class="mode-section">
        <div class="dict-item">
            <h3 id="quizQuestion">點選訓練以載入題目...</h3>
            <textarea id="quizUserAns" style="width:100%; height:100px; margin:10px 0; border-radius:8px; padding:10px;"></textarea>
            <button class="tab" style="width:100%; background:var(--accent); color:white;" onclick="evaluateQuiz()">提交核對</button>
        </div>
        <div id="quizResult" style="display:none; padding:15px; border-radius:12px; background:#fff;"></div>
    </div>
</div>

<script>
    // JS 邏輯區 (與先前邏輯一致，確保功能穩定)
    let fullData = [];
    fetch('./tax_bank.json').then(r => r.json()).then(data => {
        fullData = data.questions || data;
        renderCatalog();
        renderDict();
    });

    function renderCatalog() {
        const cats = [...new Set(fullData.map(i => i.category))];
        document.getElementById('catalogGrid').innerHTML = cats.map(c => 
            `<div class="catalog-card" onclick="alert('點選了 ${c}')">${c}</div>`
        ).join('');
    }

    function renderDict() {
        const val = document.getElementById('dictSearch').value.toLowerCase();
        const list = document.getElementById('dictList');
        const filtered = fullData.filter(i => (i.title+i.answer).toLowerCase().includes(val));
        list.innerHTML = filtered.map(i => `
            <div class="dict-item">
                <div class="dict-q">Q: ${i.title}</div>
                <div class="dict-a">A: ${i.answer}</div>
            </div>
        `).join('');
    }

    function switchMode(m) {
        document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
        document.getElementById('section' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
    }
</script>
</body>
</html>
